name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install pytest pytest-cov numpy rdkit pylint

      - name: Run tests
        run: python -m pytest tests/ -v --cov=pmeff_plugin --cov-report=term-missing

      - name: Lint
        run: pylint pmeff_plugin/ --fail-under=9.0
